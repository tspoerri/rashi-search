<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rashi Search</title>
<style>
:root {
  --bg: #f7f5f0; --panel: #ffffff; --ink: #2b2620; --muted: #8a8074;
  --accent: #7a5c2e; --accent-soft: #f0e8d8; --border: #e3ddd2;
  --hl: #fdeec7;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1a17; --panel: #26231f; --ink: #e8e2d8; --muted: #9a917f;
    --accent: #d4b476; --accent-soft: #3a3223; --border: #3a362f;
    --hl: #4a3d1e;
  }
}
* { box-sizing: border-box; margin: 0; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Frank Ruhl Libre", Georgia, "Times New Roman", "SBL Hebrew", serif;
  font-size: 17px; line-height: 1.55;
}
.wrap { max-width: 52rem; margin: 0 auto; padding: 0 1.2rem 3rem; }
header { padding: 1.1rem 0 .4rem; display: flex; align-items: baseline; gap: .9rem; flex-wrap: wrap; }
header h1 { font-size: 1.45rem; color: var(--accent); font-weight: 700; }
header .count { color: var(--muted); font-size: .82rem; }
.tabs { margin-inline-start: auto; display: flex; gap: .4rem; }
.tabs button, #kbd-btn {
  font: inherit; font-size: .82rem; padding: .25rem .8rem; cursor: pointer;
  border: 1px solid var(--border); background: var(--panel); color: var(--muted);
  border-radius: 999px;
}
.tabs button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
#controls { padding: .4rem 0 .9rem; }
.fields { display: flex; gap: .6rem; flex-wrap: wrap; align-items: flex-end; }
.field { display: flex; flex-direction: column; gap: .15rem; }
.field label { font-size: .72rem; color: var(--muted); }
input, select {
  font: inherit; padding: .45rem .6rem; border: 1px solid var(--border);
  border-radius: 8px; background: var(--panel); color: var(--ink);
}
input.he { direction: rtl; }
input:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
#f-dh { width: 13.5rem; } #f-kw { width: 13.5rem; }
#f-perek, #f-passuk { width: 4.6rem; }
#smartbar { display: none; }
#f-smart { width: 100%; font-size: 1.1rem; padding: .6rem .8rem; }
.hint { font-size: .75rem; color: var(--muted); margin-top: .35rem; }

/* Hebrew keyboard dropdown */
#kbd-wrap { position: relative; display: inline-block; }
#kbd {
  display: none; position: absolute; top: calc(100% + 6px); inset-inline-end: 0; z-index: 20;
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: .6rem; box-shadow: 0 6px 24px rgba(0,0,0,.15); width: 21rem; max-width: 90vw;
}
#kbd.open { display: block; }
#kbd .krow { display: flex; gap: .25rem; justify-content: center; margin-bottom: .25rem; direction: rtl; }
#kbd button {
  font: inherit; font-size: 1.05rem; min-width: 2rem; padding: .3rem 0; cursor: pointer;
  border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--ink);
}
#kbd button:hover { background: var(--accent-soft); }
#kbd button.wide { min-width: 5rem; font-size: .8rem; color: var(--muted); }

#results { display: flex; flex-direction: column; gap: .45rem; }
.hit {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  padding: .55rem .8rem; cursor: pointer;
}
.hit:hover { border-color: var(--accent); }
.hit.open { border-color: var(--accent); cursor: default; }
.hit .sum { direction: rtl; text-align: right; }
.hit .dh { font-weight: 700; }
.hit .ref { font-size: .78rem; color: var(--muted); }
.hit .snip { font-size: .82rem; color: var(--muted); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.hit.open .snip { display: none; }
mark { background: var(--hl); color: inherit; border-radius: 3px; padding: 0 1px; }
.exp { display: none; direction: rtl; text-align: right; margin-top: .6rem; border-top: 1px solid var(--border); padding-top: .7rem; }
.hit.open .exp { display: block; }
.exp .verse {
  font-size: 1.12rem; background: var(--accent-soft); border-radius: 8px;
  padding: .55rem .9rem; margin-bottom: .8rem;
}
.exp .rashi-dh { font-weight: 700; }
.exp .rashi-text { margin-top: .25rem; white-space: pre-wrap; }
.exp .links { margin-top: .8rem; direction: ltr; text-align: left; font-size: .82rem; }
.exp a { color: var(--accent); }
#empty { color: var(--muted); padding: 1rem 0; }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>Rashi Search</h1>
  <span class="count" id="count">Loading…</span>
  <nav class="tabs">
    <button id="tab-fields">Fields</button>
    <button id="tab-smart" class="active">Smart search</button>
    <span id="kbd-wrap">
      <button id="kbd-btn" title="Hebrew keyboard">⌨ עברית</button>
      <div id="kbd"></div>
    </span>
  </nav>
</header>

<div id="controls">
  <div class="fields" id="fieldbar">
    <div class="field"><label for="f-dh">Dibbur hamatchil</label>
      <input id="f-dh" class="he" placeholder="ויאמר"></div>
    <div class="field"><label for="f-sefer">Sefer</label>
      <select id="f-sefer"><option value="">All</option></select></div>
    <div class="field"><label for="f-parsha">Parsha</label>
      <select id="f-parsha"><option value="">All</option></select></div>
    <div class="field"><label for="f-perek">Perek</label>
      <input id="f-perek" class="he" placeholder="ג / 3"></div>
    <div class="field"><label for="f-passuk">Passuk</label>
      <input id="f-passuk" class="he" placeholder="יד / 14"></div>
    <div class="field"><label for="f-kw">Keywords</label>
      <input id="f-kw" class="he" placeholder="in the Rashi text"></div>
  </div>
  <div id="smartbar">
    <input id="f-smart" class="he" placeholder="בראשית ג יד עפר תאכל">
    <div class="hint">Combine sefer, parsha, perek and passuk (Hebrew letters or numbers) with words from the dibbur hamatchil or the Rashi text — in any order.</div>
  </div>
</div>

<div id="results"><div id="empty">Type to search.</div></div>
</div>

<script type="module">
"use strict";
import { ChipusIndex, foldToken, tokenize, boundedEditDistance } from "./lib/chipus/src/index.js";

let DB = [];          // records
let NORM = [];        // normalized {dh, t, vt} + skeleton per record
let openHit = -1;
let mode = "smart";
const WEEK = { cur: new Set(), adj: new Set() };  // this week's / adjacent parshas

const BOOKS = [];     // [{en, he}]
const PARSHAS = [];   // [{en, he, book}]

let chipusIndex = null;
let DOC_INDEX = null;             // Map<doc, i> — maps chipus result docs back to DB index
const BOOK_ALIAS = new Map();     // folded key -> book {en, he}
const PARSHA_ALIAS1 = new Map();  // folded key -> parsha {en, he, book} (single-word names)
const PARSHA_ALIAS2 = new Map();  // "key1|key2" -> parsha (two-word names, e.g. "lech lecha")

// A folded key claimed by two different books/parshas identifies nothing —
// mirrors fuzzyAlias's ambiguity-tie rule below, but at registration time.
const AMBIG = Symbol("ambiguous-alias");
function aliasSet(map, key, val) {
  const cur = map.get(key);
  map.set(key, cur === undefined || cur === val ? val : AMBIG);
}

// Build Latin/Hebrew alias maps for book & parsha names so transliterated
// queries ("lech lecha", "toldos", "bereishis") resolve in smartParse.
function registerParshaAliases(words, p) {
  if (words.length === 1) {
    for (const k of foldToken(words[0])) aliasSet(PARSHA_ALIAS1, k, p);
  } else if (words.length === 2) {
    for (const k1 of foldToken(words[0])) {
      for (const k2 of foldToken(words[1])) aliasSet(PARSHA_ALIAS2, k1 + "|" + k2, p);
    }
  }
}
// Typo fallback for alias lookup: only called after an exact-key lookup misses.
// Scans the map's folded keys for the closest match within a bounded edit
// distance; a tie between two different books/parshas is treated as no match
// (ambiguous) rather than guessed at.
function fuzzyAlias(map, keyCandidates) {
  let bestD = Infinity, bestVal = null, ambiguous = false;
  for (const cand of keyCandidates) {
    if (cand.length < 3) continue;
    const maxD = cand.length >= 6 ? 2 : 1;
    for (const [key, val] of map) {
      const d = boundedEditDistance(cand, key, maxD);
      if (d === Infinity) continue;
      if (d < bestD) { bestD = d; bestVal = val === AMBIG ? null : val; ambiguous = val === AMBIG; }
      else if (d === bestD && (val === AMBIG || val !== bestVal)) ambiguous = true;
    }
  }
  return ambiguous ? null : bestVal;
}
function buildAliases() {
  for (const b of BOOKS) {
    for (const k of foldToken(b.he)) aliasSet(BOOK_ALIAS, k, b);
    for (const w of tokenize(b.en)) for (const k of foldToken(w)) aliasSet(BOOK_ALIAS, k, b);
  }
  for (const p of PARSHAS) {
    registerParshaAliases(tokenize(p.he), p);
    registerParshaAliases(tokenize(p.en), p);
  }
}

/* ---------- Hebrew utilities ---------- */
const NIKUD_RE = /[֑-ֽֿ-ׇ]/g;   // taamim+nikud, keep maqaf
function normalize(s) {
  return s.replace(/־/g, " ")
          .replace(NIKUD_RE, "")
          .replace(/[״"׳'.,:;!?()\[\]{}]/g, "")
          .replace(/\s+/g, " ")
          .trim();
}
// ktiv-insensitive skeleton: drop ו/י so מוקדם matches מֻקְדָּם
function skel(s) {
  return s.replace(/[וי]/g, "").replace(/\s+/g, " ").trim();
}
// normalize but keep a map from normalized index -> display index
function normalizeWithMap(s) {
  let out = "", map = [];
  let lastSpace = true;
  for (let i = 0; i < s.length; i++) {
    let ch = s[i];
    if (ch === "־") ch = " ";
    if (NIKUD_RE.test(ch)) { NIKUD_RE.lastIndex = 0; continue; }
    NIKUD_RE.lastIndex = 0;
    if (/[״"׳'.,:;!?()\[\]{}]/.test(ch)) continue;
    if (/\s/.test(ch)) {
      if (lastSpace) continue;
      out += " "; map.push(i); lastSpace = true;
    } else {
      out += ch; map.push(i); lastSpace = false;
    }
  }
  return { norm: out, map };
}

const GEM = {"א":1,"ב":2,"ג":3,"ד":4,"ה":5,"ו":6,"ז":7,"ח":8,"ט":9,"י":10,
  "כ":20,"ך":20,"ל":30,"מ":40,"ם":40,"נ":50,"ן":50,"ס":60,"ע":70,"פ":80,"ף":80,
  "צ":90,"ץ":90,"ק":100,"ר":200,"ש":300,"ת":400};
function parseHebNum(tok) {
  tok = tok.replace(/[״"׳']/g, "");
  if (/^\d+$/.test(tok)) return parseInt(tok, 10);
  if (!tok || tok.length > 3) return null;
  let sum = 0, prev = Infinity;
  for (const ch of tok) {
    const v = GEM[ch];
    if (!v || v > prev) return null;   // must be non-increasing (e.g. קכג)
    sum += v; prev = v;
  }
  return sum >= 1 && sum <= 999 ? sum : null;
}
function toHebNum(n) {
  const H = [[400,"ת"],[300,"ש"],[200,"ר"],[100,"ק"],[90,"צ"],[80,"פ"],[70,"ע"],
    [60,"ס"],[50,"נ"],[40,"מ"],[30,"ל"],[20,"כ"],[10,"י"],[9,"ט"],[8,"ח"],[7,"ז"],
    [6,"ו"],[5,"ה"],[4,"ד"],[3,"ג"],[2,"ב"],[1,"א"]];
  let out = "";
  for (const [v, ch] of H) {
    while (n >= v) { out += ch; n -= v; }
  }
  return out.replace(/יה$/, "טו").replace(/יו$/, "טז");
}

/* ---------- load ---------- */
fetch("data/rashi.json").then(r => r.json()).then(data => {
  DB = data;
  const t0 = performance.now();
  NORM = data.map(r => {
    const dh = normalize(r.dh), t = normalize(r.t), vt = normalize(r.vt);
    return { dh, t, vt, dhS: skel(dh), tS: skel(t), vtS: skel(vt) };
  });
  for (const r of data) {
    if (!BOOKS.some(b => b.en === r.b)) BOOKS.push({ en: r.b, he: r.bh });
    if (!PARSHAS.some(p => p.en === r.p)) PARSHAS.push({ en: r.p, he: r.ph, book: r.b });
  }
  const selS = document.getElementById("f-sefer");
  for (const b of BOOKS) selS.add(new Option(b.he, b.en));
  fillParshas("");
  buildAliases();
  // Winning chipus v3 ranking opts from the 2026-07-19 sweep (see chipus
  // DESIGN-v3.md "Sweep results"): coverageWeight=20, refineWeightLatin=40.
  // Overridable via globalThis.CHIPUS_OPTS so the eval/sweep harness can
  // test other configs without editing this file.
  const CHIPUS_OPTS = globalThis.CHIPUS_OPTS || { coverageWeight: 20, refineWeightLatin: 40 };
  chipusIndex = new ChipusIndex({
    fields: [
      { name: "dh", weight: 3 },
      { name: "t", weight: 1 },
      { name: "vt", weight: 1 },
    ],
    ...CHIPUS_OPTS,
  });
  chipusIndex.add(DB);
  DOC_INDEX = new Map();
  DB.forEach((d, i) => DOC_INDEX.set(d, i));
  document.getElementById("count").textContent =
    DB.length.toLocaleString("en") + " Rashis · indexed in " + Math.round(performance.now() - t0) + " ms";
  runSearch();
});

// this / last / next week's parsha, via Sefaria's calendar (skipped if offline)
(async () => {
  const norm = s => s.toLowerCase().replace(/[^a-z]/g, "");
  for (const off of [0, -7, 7]) {
    try {
      const d = new Date(Date.now() + off * 864e5);
      const j = await (await fetch("https://www.sefaria.org/api/calendars?year=" +
        d.getFullYear() + "&month=" + (d.getMonth() + 1) + "&day=" + d.getDate())).json();
      const item = j.calendar_items.find(i => i.title.en === "Parashat Hashavua");
      for (const part of item.displayValue.en.split("-")) {
        const p = PARSHAS.find(p => norm(p.en) === norm(part)) ||
                  { en: part.trim() };
        (off === 0 ? WEEK.cur : WEEK.adj).add(p.en);
      }
    } catch (e) { /* offline: no parsha boost */ }
  }
})();

// Sized below the vowel-evidence quantum: chipus separates exact skeleton-
// mates (e.g. "saviv" → סביב vs יסף, both key SB) by ~10+ pts of refined-
// similarity + coverage; weekBoost must break true ties without letting a
// current-parsha skeleton-mate leapfrog a vowel-perfect match. (Was 40/20,
// which outvoted the evidence — see DESIGN-v3 D3 postscript.)
function weekBoost(r) {
  if (WEEK.cur.has(r.p)) return 8;
  if (WEEK.adj.has(r.p)) return 4;
  return 0;
}
function popBoost(r) {
  return Math.min(50, Math.log2(1 + (r.lk || 0)) * 3.5);
}

function fillParshas(book) {
  const sel = document.getElementById("f-parsha");
  const cur = sel.value;
  sel.length = 0; sel.add(new Option("All", ""));
  for (const p of PARSHAS) if (!book || p.book === book) sel.add(new Option(p.he, p.en));
  sel.value = [...sel.options].some(o => o.value === cur) ? cur : "";
}

/* ---------- scoring ---------- */
function wordMatch(hay, tok) {
  // word-prefix match; returns index in hay or -1
  if (!tok) return -1;
  let i = hay.indexOf(tok);
  while (i !== -1) {
    if (i === 0 || hay[i - 1] === " ") return i;
    i = hay.indexOf(tok, i + 1);
  }
  return -1;
}

function search(q) {
  // q: {book, parsha, perek, passuk, dh, kw} — dh/kw normalized strings
  const dhToks = q.dh ? q.dh.split(" ") : [];
  const dhS = skel(q.dh || "");
  const hits = [];

  // Free-text (kw) scoring is delegated to chipus: it handles Hebrew,
  // transliteration, and typo tolerance in one pass across dh/t/vt.
  // Run the query once, then map results back to DB indices for the
  // per-record filter loop below.
  let chipusHits = null;
  if (q.kw && chipusIndex) {
    chipusHits = new Map();
    for (const res of chipusIndex.search(q.kw, { limit: DB.length })) {
      const idx = DOC_INDEX.get(res.doc);
      if (idx !== undefined) chipusHits.set(idx, res);
    }
  }

  for (let i = 0; i < DB.length; i++) {
    const r = DB[i], n = NORM[i];
    if (q.book && r.b !== q.book) continue;
    if (q.parsha && r.p !== q.parsha) continue;
    if (q.perek && r.c !== q.perek) continue;
    if (q.passuk && r.v !== q.passuk) continue;
    let score = 0;
    if (dhToks.length) {
      if (n.dh === q.dh) score += 1000;
      else if (n.dh.startsWith(q.dh)) score += 600;
      else if (n.dh.includes(q.dh)) score += 400;
      else if (n.dhS === dhS) score += 800;          // ktiv-insensitive
      else if (n.dhS.startsWith(dhS)) score += 450;
      else if (n.dhS.includes(dhS)) score += 300;
      else {
        let all = true, any = false;
        for (const t of dhToks) {
          if (wordMatch(n.dh, t) !== -1) { score += 120; any = true; }
          else if (wordMatch(n.dhS, skel(t)) !== -1) { score += 80; any = true; }
          else if (wordMatch(n.t, t) !== -1) { score += 15; all = false; }
          else if (n.t.includes(t)) { score += 8; all = false; }
          else { all = false; }
        }
        if (!any && score === 0) continue;
        if (all) score += 100;
      }
    }
    if (q.kw) {
      const hit = chipusHits && chipusHits.get(i);
      if (hit) {
        score += hit.score;
      } else if (q.perek && q.passuk) {
        // exact perek:passuk pin keeps that passuk's Rashis visible
        // even when the free-text terms match nothing
        score = Math.max(score, 1);
      } else {
        continue;
      }
    }
    if (!dhToks.length && !q.kw) score = 1;  // pure filter browse
    if (score > 0) hits.push({ i, score: score + weekBoost(r) + popBoost(r) });
  }
  hits.sort((a, b) => b.score - a.score || a.i - b.i);
  return hits.slice(0, 60);
}

/* ---------- smart parse ---------- */
function smartParse(raw) {
  const q = { book: "", parsha: "", perek: 0, passuk: 0, dh: "", kw: "" };
  let toks = normalize(raw).split(" ").filter(Boolean);
  const rest = [];
  const nums = [];
  let i = 0;
  while (i < toks.length) {
    const tok = toks[i];
    const two = toks[i + 1] !== undefined ? tok + " " + toks[i + 1] : null;
    const isLatin = /[a-z]/i.test(tok);
    // parsha (2-word names first: לך לך, חיי שרה, כי תשא…)
    const p2 = two && PARSHAS.find(p => normalize(p.he) === two);
    if (!q.parsha && p2) { q.parsha = p2.en; q.book = p2.book; i += 2; continue; }
    // transliterated 2-word parsha names ("lech lecha", "chayei sara")
    if (!q.parsha && !q.book && isLatin && toks[i + 1] !== undefined) {
      let found = null;
      outer: for (const k1 of foldToken(tok)) {
        for (const k2 of foldToken(toks[i + 1])) {
          const hit = PARSHA_ALIAS2.get(k1 + "|" + k2);
          if (hit && hit !== AMBIG) { found = hit; break outer; }
        }
      }
      let fuzzy = false;
      if (!found) {
        const cands = [];
        for (const k1 of foldToken(tok)) for (const k2 of foldToken(toks[i + 1])) cands.push(k1 + "|" + k2);
        found = fuzzyAlias(PARSHA_ALIAS2, cands);
        fuzzy = !!found;
      }
      if (found) {
        (q._softToks ||= []).push(tok, toks[i + 1]);
        if (fuzzy) q._softFuzzy = true;
        q.parsha = found.en; q.book = found.book; i += 2; continue;
      }
    }
    if (tok === "פרשת" && toks[i + 1]) {
      const pn = PARSHAS.find(p => normalize(p.he) === toks[i + 1] ||
        (toks[i + 2] && normalize(p.he) === toks[i + 1] + " " + toks[i + 2]));
      if (pn) {
        q.parsha = pn.en; q.book = pn.book;
        i += 1 + normalize(pn.he).split(" ").length; continue;
      }
    }
    const b = BOOKS.find(b => b.he === tok);
    if (!q.book && !q.parsha && b && i === 0) { q.book = b.en; i++; continue; }
    // transliterated book name at the start of the query ("bereishis" as a
    // book falls through to the parsha check below since it's a parsha name)
    if (!q.book && !q.parsha && isLatin && i === 0) {
      let found = null;
      for (const k of foldToken(tok)) {
        if (k.length < 3) continue;
        const hit = BOOK_ALIAS.get(k);
        if (hit && hit !== AMBIG) { found = hit; break; }
      }
      const wasExact = !!found;
      if (!found) found = fuzzyAlias(BOOK_ALIAS, foldToken(tok));
      if (found) {
        (q._softToks ||= []).push(tok);
        if (!wasExact) q._softFuzzy = true;
        q.book = found.en; i++; continue;
      }
    }
    const p1 = PARSHAS.find(p => normalize(p.he) === tok);
    if (!q.parsha && !q.book && p1 && i === 0) { q.parsha = p1.en; q.book = p1.book; i++; continue; }
    // transliterated single-word parsha name ("noach", "toldos", "bereishis")
    if (!q.parsha && !q.book && isLatin && i === 0) {
      let found = null;
      for (const k of foldToken(tok)) {
        if (k.length < 3) continue;
        const hit = PARSHA_ALIAS1.get(k);
        if (hit && hit !== AMBIG) { found = hit; break; }
      }
      const wasExact = !!found;
      if (!found) found = fuzzyAlias(PARSHA_ALIAS1, foldToken(tok));
      if (found) {
        (q._softToks ||= []).push(tok);
        if (!wasExact) q._softFuzzy = true;
        q.parsha = found.en; q.book = found.book; i++; continue;
      }
    }
    const n = parseHebNum(tok);
    if (n !== null && nums.length < 2 && (q.book || q.parsha || nums.length === 1)) {
      nums.push(n); i++; continue;
    }
    rest.push(tok); i++;
  }
  if (nums.length >= 1) q.perek = nums[0];
  if (nums.length >= 2) q.passuk = nums[1];
  // free text goes to kw: it ranks across dibbur, body, and verse,
  // with phrase-level dibbur boosts applied in search()
  q.kw = rest.join(" ");
  return q;
}

// A transliterated filter capture is only a hypothesis: rerun the full
// query as free text and keep the filter only if the corpus agrees
// (top unfiltered hit falls inside the captured scope).
function resolveSoft(q) {
  if (!q._softToks || q.perek || q.passuk) return q;
  // Pure filter queries (no extra kw) from an EXACT alias hit are trusted
  // as-is — there's no free text to verify against. Fuzzy hits are riskier
  // (short-key edit-distance collisions), so always verify those.
  if (!q.kw && !q._softFuzzy) return q;
  const alt = { book: "", parsha: "", perek: 0, passuk: 0, dh: "",
                kw: (q._softToks.join(" ") + " " + q.kw).trim() };
  const altHits = search(alt);
  if (!altHits.length) return q;
  const top = DB[altHits[0].i];
  if (q.parsha ? top.p === q.parsha : top.b === q.book) return q;
  alt._softHits = altHits;
  return alt;
}

/* ---------- rendering ---------- */
function highlight(display, toks) {
  if (!toks.length) return esc(display);
  const { norm, map } = normalizeWithMap(display);
  const spans = [];
  for (const t of toks) {
    if (!t) continue;
    let idx = norm.indexOf(t);
    while (idx !== -1) {
      const from = map[idx];
      const to = idx + t.length - 1 < map.length ? map[idx + t.length - 1] + 1 : display.length;
      spans.push([from, to]);
      idx = norm.indexOf(t, idx + 1);
    }
  }
  if (!spans.length) return esc(display);
  spans.sort((a, b) => a[0] - b[0]);
  let out = "", pos = 0;
  for (const [f, t] of spans) {
    if (f < pos) continue;
    out += esc(display.slice(pos, f)) + "<mark>" + esc(display.slice(f, t)) + "</mark>";
    pos = t;
  }
  return out + esc(display.slice(pos));
}
function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function refHe(r) {
  return r.bh + " " + toHebNum(r.c) + ":" + toHebNum(r.v);
}
function sefariaUrl(r) {
  return "https://www.sefaria.org/Rashi_on_" + r.b + "." + r.c + "." + r.v + "." + r.i + "?lang=he";
}

function renderResults(hits, toks) {
  const box = document.getElementById("results");
  openHit = -1;
  if (!hits.length) {
    box.innerHTML = '<div id="empty">No results.</div>';
    return;
  }
  box.innerHTML = hits.map(h => {
    const r = DB[h.i];
    return '<div class="hit" data-i="' + h.i + '">' +
      '<div class="sum"><span class="dh">' + highlight(r.dh, toks) + '</span> ' +
      '<span class="ref">· ' + refHe(r) + " · " + esc(r.ph) + "</span>" +
      '<div class="snip">' + highlight(r.t.slice(0, 220), toks) + "</div></div>" +
      '<div class="exp"></div></div>';
  }).join("");
}

function toggleHit(el, toks) {
  const i = +el.dataset.i;
  if (el.classList.contains("open")) { el.classList.remove("open"); openHit = -1; return; }
  document.querySelectorAll(".hit.open").forEach(o => o.classList.remove("open"));
  const r = DB[i];
  el.querySelector(".exp").innerHTML =
    '<div class="verse">' + esc(r.vt) + "</div>" +
    '<div><span class="rashi-dh">' + highlight(r.dh, toks) + ".</span></div>" +
    '<div class="rashi-text">' + highlight(r.t, toks) + "</div>" +
    '<div class="links"><a href="' + sefariaUrl(r) + '" target="_blank" rel="noopener">Open in Sefaria ↗</a></div>';
  el.classList.add("open");
  openHit = i;
}

/* ---------- Hebrew keyboard ---------- */
const KBD_ROWS = [
  ["ק","ר","א","ט","ו","ן","ם","פ"],
  ["ש","ד","ג","כ","ע","י","ח","ל","ך","ף"],
  ["ז","ס","ב","ה","נ","מ","צ","ת","ץ"],
];
let lastInput = null;
function buildKbd() {
  const kbd = document.getElementById("kbd");
  kbd.innerHTML = KBD_ROWS.map(row =>
    '<div class="krow">' + row.map(ch => '<button data-ch="' + ch + '">' + ch + "</button>").join("") + "</div>"
  ).join("") +
  '<div class="krow"><button data-ch=" " class="wide">space</button>' +
  '<button data-act="bs" class="wide">⌫</button>' +
  '<button data-act="clear" class="wide">clear</button></div>';
  kbd.addEventListener("mousedown", e => e.preventDefault());  // keep input focus
  kbd.addEventListener("click", e => {
    const b = e.target.closest("button");
    if (!b) return;
    const el = lastInput || defaultInput();
    if (b.dataset.act === "clear") el.value = "";
    else if (b.dataset.act === "bs") {
      const p = el.selectionStart;
      if (p > 0) {
        el.value = el.value.slice(0, p - 1) + el.value.slice(el.selectionEnd);
        el.setSelectionRange(p - 1, p - 1);
      }
    } else {
      const p = el.selectionStart;
      el.value = el.value.slice(0, p) + b.dataset.ch + el.value.slice(el.selectionEnd);
      el.setSelectionRange(p + 1, p + 1);
    }
    el.focus();
    el.dispatchEvent(new Event("input", { bubbles: true }));
  });
}
function defaultInput() {
  return document.getElementById(mode === "smart" ? "f-smart" : "f-dh");
}

/* ---------- wiring ---------- */
let currentToks = [];
function runSearch() {
  let q;
  if (mode === "smart") {
    q = resolveSoft(smartParse(document.getElementById("f-smart").value));
  } else {
    q = {
      book: document.getElementById("f-sefer").value,
      parsha: document.getElementById("f-parsha").value,
      perek: parseHebNum(document.getElementById("f-perek").value.trim()) || 0,
      passuk: parseHebNum(document.getElementById("f-passuk").value.trim()) || 0,
      dh: normalize(document.getElementById("f-dh").value),
      kw: normalize(document.getElementById("f-kw").value),
    };
  }
  const hasAny = q.book || q.parsha || q.perek || q.passuk || q.dh || q.kw;
  if (!hasAny) {
    document.getElementById("results").innerHTML = '<div id="empty">Type to search.</div>';
    return;
  }
  currentToks = (q.dh + " " + q.kw).split(" ").filter(Boolean);
  const t0 = performance.now();
  const hits = q._softHits || search(q);
  renderResults(hits, currentToks);
  document.getElementById("count").textContent =
    hits.length + " results · " + (performance.now() - t0).toFixed(1) + " ms";
}

let deb;
function onInput() { clearTimeout(deb); deb = setTimeout(runSearch, 80); }

for (const id of ["f-dh", "f-perek", "f-passuk", "f-kw", "f-smart"]) {
  const el = document.getElementById(id);
  el.addEventListener("input", onInput);
  el.addEventListener("focus", () => { lastInput = el; });
}
document.getElementById("f-sefer").addEventListener("change", () => {
  fillParshas(document.getElementById("f-sefer").value); runSearch();
});
document.getElementById("f-parsha").addEventListener("change", () => {
  const p = PARSHAS.find(p => p.en === document.getElementById("f-parsha").value);
  if (p) { document.getElementById("f-sefer").value = p.book; fillParshas(p.book);
           document.getElementById("f-parsha").value = p.en; }
  runSearch();
});
document.getElementById("results").addEventListener("click", e => {
  if (e.target.closest("a")) return;           // let the Sefaria link work
  const hit = e.target.closest(".hit");
  if (hit) toggleHit(hit, currentToks);
});
document.getElementById("tab-fields").addEventListener("click", () => setMode("fields"));
document.getElementById("tab-smart").addEventListener("click", () => setMode("smart"));
function setMode(m) {
  mode = m;
  document.getElementById("tab-fields").classList.toggle("active", m === "fields");
  document.getElementById("tab-smart").classList.toggle("active", m === "smart");
  document.getElementById("fieldbar").style.display = m === "fields" ? "flex" : "none";
  document.getElementById("smartbar").style.display = m === "smart" ? "block" : "none";
  defaultInput().focus();
  runSearch();
}
buildKbd();
document.getElementById("kbd-btn").addEventListener("click", () => {
  document.getElementById("kbd").classList.toggle("open");
  (lastInput || defaultInput()).focus();
});
document.addEventListener("click", e => {
  if (!e.target.closest("#kbd-wrap"))
    document.getElementById("kbd").classList.remove("open");
});
</script>
</body>
